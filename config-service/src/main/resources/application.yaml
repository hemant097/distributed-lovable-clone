spring:
  application:
    name: config-service

  cloud:
    config:
      server:
        git:
          uri: https://github.com/hemant097/distributed-lovable-config.git
          username: hemant097
          password: ${GITHUB_PAT}
          default-label: main

server:
  port: 8888

#eureka-config
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka


---
# below config will be enabled when profile is k8s
spring:
  config:
    activate:
      on-profile: k8s

  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false